<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Milky Baby Daycare</title>
    <link rel="stylesheet" href="./src/site.css" />
  </head>
  <body>
    <main class="container" data-app-root>
      <h1>Welcome to the Milky Baby Daycare ✨</h1>
      <p class="subtitle">Are you picking up or dropping off?</p>
      <section class="button-row" aria-label="Main actions">
        <button type="button" data-choice="pickup" aria-pressed="false">I’m Picking Up</button>
        <button type="button" data-choice="dropoff" aria-pressed="false">I’m Dropping Off</button>
      </section>
      <section class="response" data-response data-choice="none" data-visible="false" aria-live="polite">
        Choose an option to unlock maximum cuteness.
      </section>
      <p><small>Joke website: 100% cute vibes, 0% serious daycare logistics.</small></p>
    </main>

    <script type="module">
      import { initMilkyBabyDaycare } from './src/site.js';
      initMilkyBabyDaycare(document, window, new Date());
    </script>
  </body>
</html>
